name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build server
        run: dotnet build StaffMessenger.Server/StaffMessenger.Server.csproj --configuration Release --nologo

      - name: Build desktop client
        run: dotnet build StaffMessenger.Desktop/StaffMessenger.Desktop.csproj --configuration Release --nologo

      - name: Validate deployment scripts
        run: |
          bash -n scripts/build-release.sh scripts/install-astralinux.sh deploy/astralinux/install.sh
          jq empty deploy/astralinux/appsettings.Production.json
