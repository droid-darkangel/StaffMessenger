name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux-and-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Astra Linux server and Windows client
        env:
          STAFFMESSENGER_TARGETS: server,windows
          STAFFMESSENGER_VERSION: ${{ github.ref_name }}
        run: ./scripts/build-release.sh

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: linux-and-windows
          path: artifacts/release/*
          if-no-files-found: error

  macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build macOS DMG
        env:
          STAFFMESSENGER_TARGETS: macos
          STAFFMESSENGER_VERSION: ${{ github.ref_name }}
        run: ./scripts/build-release.sh

      - name: Upload release file
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: artifacts/release/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - linux-and-windows
      - macos
    runs-on: ubuntu-latest

    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-files/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
